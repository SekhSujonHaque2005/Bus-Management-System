<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SMARTBUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="index.html" class="nav-brand" style="margin-bottom: 3rem;">
                <i class="fas fa-bus-alt"></i> SMARTBUS
            </a>
            <ul style="list-style: none;">
                <li style="margin-bottom: 0.5rem;"><a href="student-dashboard.html" class="nav-link" style="color: var(--brand); border-bottom: 2px solid var(--brand);"><i class="fas fa-chart-line"></i> SYSTEM OVERVIEW</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="book-seat.html" class="nav-link"><i class="fas fa-plus-square"></i> INITIALIZE BOOKING</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="my-bookings.html" class="nav-link"><i class="fas fa-history"></i> LOG HISTORY</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="profile.html" class="nav-link"><i class="fas fa-user-shield"></i> ACCOUNT PROFILE</a></li>
                
                <li style="margin-top: 3rem;">
                    <div class="theme-toggle" id="themeToggle" style="padding: 0.5rem; border: 1px solid var(--border); width: fit-content;">
                        <i class="fas fa-moon"></i>
                        <i class="fas fa-sun"></i>
                        <span style="font-size: 0.7rem; font-weight: 900; margin-left: 0.5rem; text-transform: uppercase;">Toggle Theme</span>
                    </div>
                </li>

                <li style="margin-top: auto; padding-top: 2rem;">
                    <a href="login.html" id="logoutBtn" style="color: #dc2626; font-weight: 900; text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em;">
                        <i class="fas fa-power-off"></i> Terminate Session
                    </a>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
                <div>
                    <h2 style="font-size: 2.5rem; text-transform: uppercase; margin-bottom: 0.5rem;">System Dashboard</h2>
                    <p style="color: var(--text-muted); font-weight: 700;">USER: <span id="studentName" style="color: var(--text-main);">STUDENT</span> | STATUS: ACTIVE</p>
                </div>
                <div style="text-align: right;">
                    <p id="currentDate" style="font-weight: 900; font-size: 0.9rem;"></p>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">LATENCY: 24ms</p>
                </div>
            </header>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
                <div class="stat-card">
                    <p style="font-size: 0.75rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Active Fleet</p>
                    <div class="value" id="activeBusesCount">0</div>
                </div>
                <div class="stat-card">
                    <p style="font-size: 0.75rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Committed Bookings</p>
                    <div class="value" id="myBookingsCount">0</div>
                </div>
                <div class="stat-card" style="background: var(--brand); color: white;">
                    <p style="font-size: 0.75rem; font-weight: 900; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.1em;">Network Efficiency</p>
                    <div class="value">98.2%</div>
                </div>
            </div>

            <div class="handcrafted-card" style="background: var(--bg-main);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="font-size: 1.2rem; text-transform: uppercase;">Real-Time Transit Infrastructure</h3>
                    <button class="premium-btn btn-outline" id="refreshBusesBtn" style="padding: 0.4rem 1rem; font-size: 0.7rem;">Sync Data</button>
                </div>
                <div id="liveMap" style="height: 500px; border: 1px solid var(--border); filter: grayscale(100%) contrast(1.1);"></div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/theme.js" type="module"></script>
    <script type="module">
        import { apiFetch, logout, getUserData } from './js/api.js';

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        const user = getUserData();
        if (user) document.getElementById('studentName').textContent = user.name.toUpperCase();
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

        let map = L.map('liveMap').setView([31.25, 75.70], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function updateDashboard() {
            try {
                const buses = await apiFetch('/buses');
                document.getElementById('activeBusesCount').textContent = buses.buses.length;
                
                const bookings = await apiFetch('/bookings/my');
                document.getElementById('myBookingsCount').textContent = bookings.bookings.filter(b => b.status === 'confirmed').length;

                buses.buses.forEach(bus => {
                    if (bus.location && bus.location.coordinates) {
                        const [lat, lng] = bus.location.coordinates;
                        L.marker([lat, lng]).addTo(map).bindPopup(`UNIT ${bus.busNumber}`);
                    }
                });
            } catch (err) {}
        }

        updateDashboard();
        setInterval(updateDashboard, 15000);
    </script>
</body>
</html>
