<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SmartBus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar glass" style="border-right: 1px solid var(--border);">
            <div class="nav-brand" style="padding: 1.5rem; margin-bottom: 2rem;">
                <i class="fas fa-bus-simple"></i> SmartBus
            </div>
            <ul style="list-style: none; padding: 0 1rem;">
                <li style="margin-bottom: 0.5rem;"><a href="student-dashboard.html" class="nav-link active" style="background: var(--p-50); color: var(--primary); padding: 0.8rem 1rem; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 0.75rem;"><i class="fas fa-grid-2"></i> Overview</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="book-seat.html" class="nav-link" style="padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.75rem;"><i class="fas fa-plus-circle"></i> Book Seat</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="my-bookings.html" class="nav-link" style="padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.75rem;"><i class="fas fa-history"></i> My Bookings</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="profile.html" class="nav-link" style="padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.75rem;"><i class="fas fa-user"></i> Profile</a></li>
                
                <li style="margin-top: 3rem; padding: 0 1rem;">
                    <div class="theme-toggle" id="themeToggle" style="width: 100%; border-radius: var(--radius-sm); gap: 0.5rem; justify-content: flex-start; padding: 0 1rem;">
                        <i class="fas fa-moon"></i>
                        <span style="font-size: 0.9rem; font-weight: 600;">Switch Theme</span>
                    </div>
                </li>

                <li style="margin-top: auto; padding-top: 2rem;"><a href="#" id="logoutBtn" style="color: var(--error); padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.75rem;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header" style="margin-bottom: 3rem;">
                <div>
                    <h2 style="font-family: var(--font-display); font-size: 2rem;">Hey, <span id="studentName">Sujon</span> 👋</h2>
                    <p style="color: var(--text-muted);">Welcome back to your campus transit hub.</p>
                </div>
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="theme-toggle mobile-only" id="themeToggleMobile" style="display: none;">
                        <i class="fas fa-moon"></i>
                    </div>
                    <div style="position: relative;">
                        <i class="fas fa-bell fa-lg" style="color: var(--text-muted); cursor: pointer;"></i>
                        <span style="position: absolute; top: -5px; right: -5px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 2px solid var(--bg-main);"></span>
                    </div>
                    <div style="width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800;">S</div>
                </div>
            </header>

            <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
                <div class="handcrafted-card">
                    <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem;">ACTIVE BUSES</p>
                    <div style="font-size: 2.5rem; font-family: var(--font-display); font-weight: 800;" id="activeBusesCount">0</div>
                </div>
                <div class="handcrafted-card">
                    <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem;">MY BOOKINGS</p>
                    <div style="font-size: 2.5rem; font-family: var(--font-display); font-weight: 800;" id="myBookingsCount">0</div>
                </div>
                <div class="handcrafted-card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none;">
                    <p style="color: rgba(255,255,255,0.8); font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem;">NEXT BUS</p>
                    <div style="font-size: 2.5rem; font-family: var(--font-display); font-weight: 800;">10:45</div>
                    <p style="font-size: 0.8rem; opacity: 0.9;">Main Gate &bull; Route 42</p>
                </div>
            </div>

            <div class="handcrafted-card" style="padding: 1.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="font-family: var(--font-display);">Live Fleet Monitor</h3>
                    <button class="premium-btn btn-outline" id="refreshBusesBtn" style="padding: 0.5rem 1rem; font-size: 0.8rem;"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <div id="liveMap" style="height: 450px; border-radius: var(--radius-md); overflow: hidden;"></div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/theme.js" type="module"></script>
    <script type="module">
        import { apiFetch, logout, getUserData } from './js/api.js';

        document.getElementById('logoutBtn').addEventListener('click', logout);
        const user = getUserData();
        if (user) document.getElementById('studentName').textContent = user.name.split(' ')[0];

        let map = L.map('liveMap').setView([31.25, 75.70], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function updateDashboard() {
            try {
                const buses = await apiFetch('/buses');
                document.getElementById('activeBusesCount').textContent = buses.buses.length;
                
                const bookings = await apiFetch('/bookings/my');
                document.getElementById('myBookingsCount').textContent = bookings.bookings.filter(b => b.status === 'confirmed').length;

                buses.buses.forEach(bus => {
                    if (bus.location && bus.location.coordinates) {
                        const [lat, lng] = bus.location.coordinates;
                        L.marker([lat, lng]).addTo(map).bindPopup(`Bus ${bus.busNumber}`);
                    }
                });
            } catch (err) {}
        }

        updateDashboard();
        setInterval(updateDashboard, 15000);
    </script>
</body>
</html>
