<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SMARTBUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="index.html" class="nav-brand" style="margin-bottom: 3rem;">
                <i class="fas fa-bus-alt"></i> SMARTBUS
            </a>
            <ul style="list-style: none;" id="sidebarLinks">
                <!-- Links injected by JS -->
            </ul>
        </aside>

        <main class="dashboard-content">
            <header style="margin-bottom: 4rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
                <h2 style="font-size: 2.5rem; text-transform: uppercase;">Account Profile Infrastructure</h2>
                <p style="color: var(--text-muted); font-weight: 700;">USER IDENTITY VERIFICATION STATUS: SECURE</p>
            </header>

            <div class="handcrafted-card" style="max-width: 600px; background: var(--bg-main);">
                <form id="profileForm">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;">Identity Legal Name</label>
                        <input type="text" id="profileName" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); font-family: var(--font-serif); font-size: 1.1rem; background: var(--bg-surface); color: var(--text-main);">
                    </div>
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;">Institutional Email Pointer</label>
                        <input type="email" id="profileEmail" readonly style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); font-family: var(--font-serif); font-size: 1.1rem; background: #f0f0f0; color: #888; cursor: not-allowed;">
                    </div>
                    
                    <button type="submit" class="premium-btn btn-fill" style="width: 100%; padding: 1rem; font-size: 1rem;">Execute Profile Update</button>
                </form>

                <div style="margin-top: 4rem; padding-top: 2rem; border-top: 2px solid var(--border);">
                    <h4 style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; color: #dc2626; margin-bottom: 1rem;">Security & Deletion</h4>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem;">This command will permanently terminate your account and wipe all allocation history from the master database.</p>
                    <button class="premium-btn btn-outline" style="width: 100%; color: #dc2626; border-color: #dc2626;" id="deleteAccBtn">Terminate Institutional Account</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/theme.js" type="module"></script>
    <script type="module">
        import { apiFetch, showToast, logout, getUserData, setUserData } from './js/api.js';

        const user = getUserData();
        if (!user) window.location.href = 'login.html';

        // Dynamic Sidebar Logic
        const sidebar = document.getElementById('sidebarLinks');
        const role = user.role;

        const links = {
            student: [
                { href: 'student-dashboard.html', icon: 'fas fa-chart-line', text: 'SYSTEM OVERVIEW' },
                { href: 'book-seat.html', icon: 'fas fa-plus-square', text: 'INITIALIZE BOOKING' },
                { href: 'my-bookings.html', icon: 'fas fa-history', text: 'LOG HISTORY' }
            ],
            driver: [
                { href: 'driver-dashboard.html', icon: 'fas fa-route', text: 'ACTIVE MISSION' }
            ],
            admin: [
                { href: 'admin-dashboard.html', icon: 'fas fa-chart-bar', text: 'ANALYTICS HUB' },
                { href: 'admin-manage-buses.html', icon: 'fas fa-bus', text: 'FLEET MGMT' },
                { href: 'admin-manage-routes.html', icon: 'fas fa-route', text: 'NETWORK MGMT' }
            ]
        };

        const roleLinks = links[role] || [];
        
        let html = '';
        roleLinks.forEach(link => {
            html += `<li style="margin-bottom: 0.5rem;"><a href="${link.href}" class="nav-link"><i class="${link.icon}"></i> ${link.text}</a></li>`;
        });

        html += `<li style="margin-bottom: 0.5rem;"><a href="profile.html" class="nav-link" style="color: var(--brand); border-bottom: 2px solid var(--brand);"><i class="fas fa-user-shield"></i> ACCOUNT PROFILE</a></li>`;
        
        html += `
            <li style="margin-top: 3rem;">
                <div class="theme-toggle" id="themeToggle" style="padding: 0.5rem; border: 1px solid var(--border); width: fit-content;">
                    <i class="fas fa-moon"></i>
                    <span style="font-size: 0.7rem; font-weight: 900; margin-left: 0.5rem; text-transform: uppercase;">Toggle Theme</span>
                </div>
            </li>
            <li style="margin-top: auto; padding-top: 2rem;">
                <a href="login.html" id="logoutBtn" style="color: #dc2626; font-weight: 900; text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em;">
                    <i class="fas fa-power-off"></i> Terminate Session
                </a>
            </li>
        `;

        sidebar.innerHTML = html;

        // Re-attach listeners
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); logout(); });
        
        if (user) {
            document.getElementById('profileName').value = user.name;
            document.getElementById('profileEmail').value = user.email;
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('profileName').value;
            try {
                const result = await apiFetch('/auth/profile', 'PUT', { name });
                setUserData(result.user);
                showToast('PROFILE UPDATE EXECUTED', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        });

        document.getElementById('deleteAccBtn').addEventListener('click', async () => {
            if (confirm('PERMANENTLY TERMINATE ACCOUNT?')) {
                try {
                    await apiFetch('/auth/profile', 'DELETE');
                    showToast('ACCOUNT TERMINATED', 'success');
                    logout();
                } catch (err) { showToast(err.message, 'error'); }
            }
        });
    </script>
</body>
</html>
