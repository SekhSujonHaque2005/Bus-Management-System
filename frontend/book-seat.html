<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | SMARTBUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="index.html" class="nav-brand" style="margin-bottom: 3rem;">
                <i class="fas fa-bus-alt"></i> SMARTBUS
            </a>
            <ul style="list-style: none;">
                <li style="margin-bottom: 0.5rem;"><a href="student-dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> SYSTEM OVERVIEW</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="book-seat.html" class="nav-link" style="color: var(--brand); border-bottom: 2px solid var(--brand);"><i class="fas fa-plus-square"></i> INITIALIZE BOOKING</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="my-bookings.html" class="nav-link"><i class="fas fa-history"></i> LOG HISTORY</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="profile.html" class="nav-link"><i class="fas fa-user-shield"></i> ACCOUNT PROFILE</a></li>
                
                <li style="margin-top: 3rem;">
                    <div class="theme-toggle" id="themeToggle" style="padding: 0.5rem; border: 1px solid var(--border); width: fit-content;">
                        <i class="fas fa-moon"></i>
                        <span style="font-size: 0.7rem; font-weight: 900; margin-left: 0.5rem; text-transform: uppercase;">Toggle Theme</span>
                    </div>
                </li>

                <li style="margin-top: auto; padding-top: 2rem;">
                    <a href="login.html" id="logoutBtn" style="color: #dc2626; font-weight: 900; text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em;">
                        <i class="fas fa-power-off"></i> Terminate Session
                    </a>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header style="margin-bottom: 4rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
                <h2 style="font-size: 2.5rem; text-transform: uppercase;">Initialize Booking</h2>
                <p style="color: var(--text-muted); font-weight: 700;">PROTOCOL: SEAT_ALLOCATION_V1</p>
            </header>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;" id="routesList">
                <!-- Route Cards -->
            </div>
        </main>
    </div>

    <script src="js/theme.js" type="module"></script>
    <script type="module">
        import { apiFetch, showToast, logout } from './js/api.js';
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); logout(); });

        async function loadRoutes() {
            try {
                const result = await apiFetch('/routes');
                const container = document.getElementById('routesList');
                container.innerHTML = '';

                result.routes.forEach(route => {
                    const card = document.createElement('div');
                    card.className = 'handcrafted-card';
                    card.style.background = 'var(--bg-main)';
                    card.innerHTML = `
                        <div style="font-size: 0.7rem; font-weight: 900; color: var(--brand); margin-bottom: 1rem;">ROUTE ID: ${route._id.slice(-6).toUpperCase()}</div>
                        <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">${route.destination}</h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted); font-weight: 700; margin-bottom: 1.5rem;">ORIGIN: ${route.source}</p>
                        <div style="font-size: 0.75rem; border: 1px solid var(--border); padding: 0.8rem; margin-bottom: 1.5rem;">
                            <strong>STOPS:</strong> ${route.stops.join(' | ')}
                        </div>
                        <button class="premium-btn btn-fill btn-book" data-id="${route._id}" data-dest="${route.destination}" style="width: 100%;">Commit Reservation</button>
                    `;
                    container.appendChild(card);
                });

                document.querySelectorAll('.btn-book').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const routeId = e.target.dataset.id;
                        try {
                            const buses = await apiFetch(`/buses/route/${routeId}`);
                            if (!buses.buses || buses.buses.length === 0) throw new Error('NO UNITS AVAILABLE ON THIS ROUTE');
                            
                            await apiFetch('/bookings', 'POST', { 
                                busId: buses.buses[0]._id,
                                routeId: routeId,
                                seatNumber: Math.floor(Math.random() * 40) + 1
                            });
                            
                            showToast('ALLOCATION SUCCESSFUL', 'success');
                            setTimeout(() => window.location.href = 'my-bookings.html', 1000);
                        } catch (err) {
                            showToast(err.message, 'error');
                        }
                    });
                });
            } catch (err) { showToast(err.message, 'error'); }
        }
        loadRoutes();
    </script>
</body>
</html>
