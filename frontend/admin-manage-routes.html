<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Mgmt | SMARTBUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="index.html" class="nav-brand" style="margin-bottom: 3rem;"><i class="fas fa-shield-alt"></i> ADMIN PANEL</a>
            <ul style="list-style: none;">
                <li style="margin-bottom: 0.5rem;"><a href="admin-dashboard.html" class="nav-link"><i class="fas fa-chart-bar"></i> ANALYTICS HUB</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="admin-manage-buses.html" class="nav-link"><i class="fas fa-bus"></i> FLEET MGMT</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="admin-manage-routes.html" class="nav-link" style="color: var(--brand); border-bottom: 2px solid var(--brand);"><i class="fas fa-route"></i> NETWORK MGMT</a></li>
                <li style="margin-top: auto; padding-top: 2rem;"><a href="login.html" id="logoutBtn" style="color: #dc2626; font-weight: 900; text-decoration: none; font-size: 0.85rem; text-transform: uppercase;"><i class="fas fa-power-off"></i> Terminate Admin</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
                <h2 style="font-size: 2.5rem; text-transform: uppercase;">Infrastructure Network Topology</h2>
                <button class="premium-btn btn-fill" onclick="document.getElementById('routeModal').style.display='flex'">Define Route</button>
            </header>

            <div class="handcrafted-card" style="background: var(--bg-main); padding: 0;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--bg-surface); border-bottom: 2px solid var(--border);">
                            <th style="padding: 1rem; text-align: left; text-transform: uppercase;">Origin</th>
                            <th style="padding: 1rem; text-align: left; text-transform: uppercase;">Destination</th>
                            <th style="padding: 1rem; text-align: left; text-transform: uppercase;">Node Stops</th>
                            <th style="padding: 1rem; text-align: right; text-transform: uppercase;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="routesTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="routeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="handcrafted-card" style="width: 100%; max-width: 400px; background: var(--bg-main);">
            <h3 style="margin-bottom: 2rem; text-transform: uppercase;">Define Network Route</h3>
            <form id="routeForm">
                <input type="text" id="source" required placeholder="ORIGIN NODE" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border); font-family: var(--font-serif);">
                <input type="text" id="destination" required placeholder="DESTINATION NODE" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border); font-family: var(--font-serif);">
                <input type="text" id="stops" required placeholder="INTERMEDIATE STOPS (COMMA SEP)" style="width: 100%; padding: 0.8rem; margin-bottom: 2rem; border: 1px solid var(--border); font-family: var(--font-serif);">
                <button type="submit" class="premium-btn btn-fill" style="width: 100%;">Authorize Definition</button>
                <button type="button" class="premium-btn btn-outline" style="width: 100%; margin-top: 1rem;" onclick="document.getElementById('routeModal').style.display='none'">Abort</button>
            </form>
        </div>
    </div>

    <script src="js/theme.js" type="module"></script>
    <script type="module">
        import { apiFetch, showToast, logout } from './js/api.js';
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); logout(); });

        async function loadRoutes() {
            try {
                const result = await apiFetch('/routes');
                const tbody = document.getElementById('routesTableBody');
                tbody.innerHTML = '';
                result.routes.forEach(route => {
                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid var(--border)';
                    row.innerHTML = `<td style="padding: 1rem;">${route.source}</td><td style="padding: 1rem; font-weight: 700;">${route.destination}</td><td style="padding: 1rem; font-size: 0.8rem;">${route.stops.join(' | ')}</td><td style="padding: 1rem; text-align: right;"><button class="btn-delete" data-id="${route._id}" style="color: #dc2626; background: none; border: 1px solid #dc2626; padding: 0.2rem 0.5rem; cursor: pointer; font-family: var(--font-serif); font-weight: 900;">DELETE</button></td>`;
                    tbody.appendChild(row);
                });
                document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async (e) => { if(confirm('DELETE ROUTE?')) { await apiFetch(`/routes/${e.target.dataset.id}`, 'DELETE'); loadRoutes(); } }));
            } catch (err) {}
        }

        document.getElementById('routeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { source: document.getElementById('source').value, destination: document.getElementById('destination').value, stops: document.getElementById('stops').value.split(',').map(s => s.trim()) };
            try { await apiFetch('/routes', 'POST', data); document.getElementById('routeModal').style.display='none'; loadRoutes(); } catch (err) {}
        });

        loadRoutes();
    </script>
</body>
</html>
