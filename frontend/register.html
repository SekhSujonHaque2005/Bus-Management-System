<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | LPU Smart Bus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card animate-up">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                    <i class="fas fa-bus"></i> LPU Smart Bus
                </a>
                <h2 style="font-family: var(--font-display); font-size: 1.8rem;">Join the Smart Fleet</h2>
                <p style="color: var(--text-muted);">Experience next-generation campus transit.</p>
            </div>

            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="Sekh Sujon Haque">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="input-group">
                    <label>Account Type</label>
                    <select id="role" required style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.1);">
                        <option value="student">Student</option>
                        <option value="driver">Driver</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login here</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { apiFetch, showToast } from './js/api.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                await apiFetch('/auth/register', 'POST', data);
                showToast('Registration Successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
