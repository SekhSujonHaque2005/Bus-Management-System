<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | SMARTBUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--bg-surface);">

    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="handcrafted-card" style="width: 100%; max-width: 480px; padding: 3.5rem; background: var(--bg-main);">
            <div style="text-align: center; margin-bottom: 3rem;">
                <a href="index.html" class="nav-brand" style="justify-content: center; margin-bottom: 1.5rem;">
                    <i class="fas fa-bus-alt"></i> SMARTBUS
                </a>
                <h2 style="font-family: var(--font-serif); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem;">Initialize Account</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 700;">REGISTRATION PROTOCOL V2.1</p>
            </div>

            <form id="registerForm">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;">Full Legal Name</label>
                    <input type="text" id="name" required placeholder="Sekh Sujon Haque" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); font-family: var(--font-serif); font-size: 1rem; background: var(--bg-surface); color: var(--text-main);">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;">Institutional Email</label>
                    <input type="email" id="email" required placeholder="name@institutional.edu" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); font-family: var(--font-serif); font-size: 1rem; background: var(--bg-surface); color: var(--text-main);">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;">Security Password</label>
                    <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); font-family: var(--font-serif); font-size: 1rem; background: var(--bg-surface); color: var(--text-main);">
                </div>

                <div style="margin-bottom: 2rem;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;">Operational Role</label>
                    <select id="role" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); font-family: var(--font-serif); font-size: 1rem; background: var(--bg-surface); color: var(--text-main);">
                        <option value="student">Student Account</option>
                        <option value="driver">Logistics Driver</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>

                <button type="submit" class="premium-btn btn-fill" style="width: 100%; padding: 1rem; font-size: 1rem;">Authenticate & Register</button>
            </form>

            <div style="text-align: center; margin-top: 2.5rem; font-size: 0.9rem; font-weight: 700; color: var(--text-muted);">
                Existing credentials? <a href="login.html" style="color: var(--brand); text-decoration: none;">Proceed to Log In</a>
            </div>
            
            <div style="display: flex; justify-content: center; margin-top: 2rem;">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js" type="module"></script>
    <script type="module">
        import { apiFetch, showToast } from './js/api.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                await apiFetch('/auth/register', 'POST', data);
                showToast('Registration Successful!', 'success');
                setTimeout(() => window.location.href = 'login.html', 1200);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
