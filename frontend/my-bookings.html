<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | LPU Smart Bus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo" style="padding: 1rem 0; margin-bottom: 2rem;">
                <i class="fas fa-bus"></i> Smart Bus
            </div>
            <ul>
                <li><a href="student-dashboard.html"><i class="fas fa-home"></i> Overview</a></li>
                <li><a href="book-seat.html"><i class="fas fa-plus-circle"></i> Book Seat</a></li>
                <li><a href="my-bookings.html" class="active"><i class="fas fa-history"></i> My Bookings</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li style="margin-top: auto;"><a href="#" id="logoutBtn" style="color: var(--error);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h2>Booking History</h2>
                <div class="user-profile">
                    <span id="studentName">Student</span>
                    <i class="fas fa-circle-user fa-lg"></i>
                </div>
            </header>

            <div class="table-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3>Your Reservations</h3>
                    <button class="btn btn-secondary" id="refreshBookingsBtn"><i class="fas fa-sync"></i> Refresh</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Bus Info</th>
                            <th>Destination</th>
                            <th>Seat #</th>
                            <th>Date & Time</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <!-- Rows will be injected by JS -->
                    </tbody>
                </table>
                <div id="noBookingsMsg" style="text-align: center; padding: 3rem; display: none;">
                    <i class="fas fa-calendar-xmark fa-3x" style="color: #e2e8f0; margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-muted);">You haven't made any bookings yet.</p>
                    <a href="book-seat.html" class="btn btn-primary" style="margin-top: 1rem;">Book Your First Seat</a>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { apiFetch, showToast, logout } from './js/api.js';

        document.getElementById('logoutBtn').addEventListener('click', logout);

        async function loadBookings() {
            try {
                const result = await apiFetch('/bookings/my');
                const tbody = document.getElementById('bookingsTableBody');
                const noMsg = document.getElementById('noBookingsMsg');
                tbody.innerHTML = '';

                if (!result.bookings || result.bookings.length === 0) {
                    noMsg.style.display = 'block';
                    return;
                }

                noMsg.style.display = 'none';
                result.bookings.forEach(booking => {
                    const row = document.createElement('tr');
                    const date = new Date(booking.createdAt).toLocaleString();
                    
                    row.innerHTML = `
                        <td><strong>${booking.busId.busNumber}</strong><br><small>${booking.busId.busType}</small></td>
                        <td>${booking.busId.routeId.destination}</td>
                        <td><span class="badge active">${booking.seatNumber}</span></td>
                        <td>${date}</td>
                        <td><span class="badge ${booking.status === 'confirmed' ? 'active' : 'inactive'}">${booking.status}</span></td>
                        <td>
                            ${booking.status === 'confirmed' ? 
                                `<button class="btn btn-secondary btn-cancel" data-id="${booking._id}" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; color: var(--error);">Cancel</button>` 
                                : '-'}
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.querySelectorAll('.btn-cancel').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm('Are you sure you want to cancel this booking?')) {
                            try {
                                await apiFetch(`/bookings/${e.target.dataset.id}/cancel`, 'PATCH');
                                showToast('Booking cancelled', 'success');
                                loadBookings();
                            } catch (err) {
                                showToast(err.message, 'error');
                            }
                        }
                    });
                });

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        document.getElementById('refreshBookingsBtn').addEventListener('click', loadBookings);
        loadBookings();
    </script>
</body>
</html>
