<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Buses | Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo" style="padding: 1rem 0; margin-bottom: 2rem;">
                <i class="fas fa-user-shield"></i> Admin Panel
            </div>
            <ul>
                <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
                <li><a href="admin-manage-buses.html" class="active"><i class="fas fa-bus"></i> Manage Buses</a></li>
                <li><a href="admin-manage-routes.html"><i class="fas fa-route"></i> Manage Routes</a></li>
                <li><a href="admin-manage-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                <li style="margin-top: auto;"><a href="#" id="logoutBtn" style="color: var(--error);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h2>Bus Fleet Management</h2>
                <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add New Bus</button>
            </header>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Bus Number</th>
                            <th>Model/Type</th>
                            <th>Route</th>
                            <th>Driver</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="busesTableBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Bus Modal -->
    <div id="busModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Bus</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="busForm">
                <div class="input-group">
                    <label>Bus Number</label>
                    <input type="text" id="busNumber" required placeholder="e.g. PB-01-1234">
                </div>
                <div class="input-group">
                    <label>Bus Type</label>
                    <input type="text" id="busType" required placeholder="e.g. AC Sleeper">
                </div>
                <div class="input-group">
                    <label>Route</label>
                    <select id="routeSelect" required style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid #e2e8f0;">
                        <option value="">Select Route</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Total Seats</label>
                    <input type="number" id="capacity" required value="40">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Bus</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { apiFetch, showToast, logout } from './js/api.js';

        document.getElementById('logoutBtn').addEventListener('click', logout);

        async function loadBuses() {
            try {
                const result = await apiFetch('/buses');
                const tbody = document.getElementById('busesTableBody');
                tbody.innerHTML = '';

                result.buses.forEach(bus => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${bus.busNumber}</strong></td>
                        <td>${bus.busType}</td>
                        <td>${bus.routeId ? bus.routeId.destination : 'No Route'}</td>
                        <td>${bus.driverId ? bus.driverId.name : 'Unassigned'}</td>
                        <td><span class="badge active">${bus.status}</span></td>
                        <td>
                            <button class="btn btn-secondary btn-delete" data-id="${bus._id}" style="color: var(--error);"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm('Delete this bus?')) {
                            try {
                                await apiFetch(`/buses/${e.target.closest('button').dataset.id}`, 'DELETE');
                                showToast('Bus removed', 'success');
                                loadBuses();
                            } catch (err) {
                                showToast(err.message, 'error');
                            }
                        }
                    });
                });

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function loadRoutes() {
            try {
                const result = await apiFetch('/routes');
                const select = document.getElementById('routeSelect');
                result.routes.forEach(route => {
                    const opt = document.createElement('option');
                    opt.value = route._id;
                    opt.textContent = `${route.source} → ${route.destination}`;
                    select.appendChild(opt);
                });
            } catch (err) {}
        }

        window.openAddModal = () => {
            document.getElementById('busModal').classList.add('active');
        };

        window.closeModal = () => {
            document.getElementById('busModal').classList.remove('active');
        };

        document.getElementById('busForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                busNumber: document.getElementById('busNumber').value,
                busType: document.getElementById('busType').value,
                routeId: document.getElementById('routeSelect').value,
                capacity: document.getElementById('capacity').value
            };

            try {
                await apiFetch('/buses', 'POST', data);
                showToast('Bus added successfully', 'success');
                closeModal();
                loadBuses();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        loadBuses();
        loadRoutes();
    </script>
</body>
</html>
