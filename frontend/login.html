<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Campus Bus</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav>
        <div class="brand">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 16C4 17.1 4.9 18 6 18H6.5L6 20H8L8.5 18H15.5L16 20H18L17.5 18H18C19.1 18 20 17.1 20 16V6C20 3.8 18.2 2 16 2H8C5.8 2 4 3.8 4 6V16ZM7.5 13C6.7 13 6 12.3 6 11.5C6 10.7 6.7 10 7.5 10C8.3 10 9 10.7 9 11.5C9 12.3 8.3 13 7.5 13ZM16.5 13C15.7 13 15 12.3 15 11.5C15 10.7 15.7 10 16.5 10C17.3 10 18 10.7 18 11.5C18 12.3 17.3 13 16.5 13ZM6 6H18V8H6V6Z"/>
            </svg>
            <a href="index.html" style="color: inherit;">LPU Smart Bus</a>
        </div>
        <ul>
            <li><a href="register.html" class="btn">Register</a></li>
        </ul>
    </nav>

    <main class="auth-split">
        <div class="auth-split-left">
            <h1>Welcome Back!</h1>
            <p>Access your dashboard to track buses, book seats, and manage your campus transit effortlessly.</p>
        </div>
        <div class="auth-split-right">
            <div class="auth-card" style="box-shadow: none; border: none; background: transparent; padding: 0;">
                <h2>Login to Your Account</h2>
                
                <div class="demo-buttons">
                    <button class="demo-btn" onclick="fillDemo('student@lpu.in', 'password123')">Demo Student</button>
                    <button class="demo-btn" onclick="fillDemo('admin@lpu.in', 'password123')">Demo Admin</button>
                    <button class="demo-btn" onclick="fillDemo('driver@lpu.in', 'password123')">Demo Driver</button>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" required placeholder="Email">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" required placeholder="Password">
                        <label for="password">Password</label>
                        <div class="password-toggle" onclick="togglePassword('password')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>
                    <label class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Remember me for 30 days</span>
                    </label>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 0.5rem;">Login to Dashboard</button>
                </form>
                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Register here</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
        function fillDemo(email, pass) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = pass;
        }
    </script>
    <script src="./js/api.js" type="module"></script>
    <script src="./js/auth.js" type="module"></script>
</body>
</html>
