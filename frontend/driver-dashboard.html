<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | Smart Bus System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo" style="padding: 1rem 0; margin-bottom: 2rem;">
                <i class="fas fa-steering-wheel"></i> Driver App
            </div>
            <ul>
                <li><a href="driver-dashboard.html" class="active"><i class="fas fa-route"></i> Current Route</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li style="margin-top: auto;"><a href="#" id="logoutBtn" style="color: var(--error);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h2>Live Trip Status</h2>
                <div class="user-profile">
                    <span id="driverName">Driver</span>
                    <i class="fas fa-id-card fa-lg"></i>
                </div>
            </header>

            <div class="table-container">
                <div style="text-align: center; padding: 2rem;">
                    <h3 style="margin-bottom: 1rem;">Update Your Location</h3>
                    <p style="color: var(--text-muted); margin-bottom: 2rem;">Turn on location sharing to let students track your bus.</p>
                    
                    <button class="btn btn-primary" id="startTripBtn" style="padding: 1.5rem 3rem; font-size: 1.2rem;">
                        <i class="fas fa-play"></i> Start Trip
                    </button>
                    
                    <button class="btn btn-secondary" id="stopTripBtn" style="display: none; padding: 1.5rem 3rem; font-size: 1.2rem; color: var(--error);">
                        <i class="fas fa-stop"></i> End Trip
                    </button>
                </div>

                <div id="statusInfo" style="margin-top: 2rem; display: none; text-align: center;">
                    <div class="badge active" style="padding: 1rem 2rem; font-size: 1rem;">
                        <i class="fas fa-signal"></i> Location Sharing Active
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { apiFetch, logout, getUserData } from './js/api.js';

        document.getElementById('logoutBtn').addEventListener('click', logout);
        const user = getUserData();
        if (user) document.getElementById('driverName').textContent = user.name;

        let watchId = null;

        document.getElementById('startTripBtn').addEventListener('click', () => {
            if ("geolocation" in navigator) {
                document.getElementById('startTripBtn').style.display = 'none';
                document.getElementById('stopTripBtn').style.display = 'inline-flex';
                document.getElementById('statusInfo').style.display = 'block';

                watchId = navigator.geolocation.watchPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    try {
                        await apiFetch('/buses/location', 'PATCH', { 
                            coordinates: [latitude, longitude] 
                        });
                    } catch (err) {
                        console.error('Location update failed:', err);
                    }
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        });

        document.getElementById('stopTripBtn').addEventListener('click', () => {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            document.getElementById('startTripBtn').style.display = 'inline-flex';
            document.getElementById('stopTripBtn').style.display = 'none';
            document.getElementById('statusInfo').style.display = 'none';
        });
    </script>
</body>
</html>
